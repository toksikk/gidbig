name: Auto-merge on approval

on:
    pull_request_review:
        types: [submitted]
    issue_comment:
        types: [created]

jobs:
    merge-on-review:
        name: Merge on PR approval
        if: |
            github.event_name == 'pull_request_review' &&
            github.event.review.state == 'approved' &&
            github.event.pull_request.base.ref == 'master' &&
            github.event.review.user.login == github.repository_owner
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Squash merge and reset testing
              uses: actions/github-script@v7
              with:
                  script: |
                      const pr = context.payload.pull_request;

                      const { data: { check_runs } } = await github.rest.checks.listForRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: pr.head.sha,
                      });
                      const relevant = check_runs.filter(r => !r.name.startsWith('Merge on'));
                      const pending = relevant.filter(r => r.status !== 'completed');
                      const failed = relevant.filter(r =>
                        r.status === 'completed' &&
                        !['success', 'skipped', 'neutral'].includes(r.conclusion)
                      );
                      if (pending.length > 0) {
                        core.setFailed('CI still running: ' + pending.map(r => r.name).join(', '));
                        return;
                      }
                      if (failed.length > 0) {
                        core.setFailed('CI failed: ' + failed.map(r => r.name).join(', '));
                        return;
                      }

                      await github.rest.pulls.merge({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr.number,
                        merge_method: 'squash',
                      });

                      const { data: masterRef } = await github.rest.git.getRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: 'heads/master',
                      });
                      await github.rest.git.updateRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: 'heads/testing',
                        sha: masterRef.object.sha,
                        force: true,
                      });
                      core.info(`PR #${pr.number} squash-merged to master; testing reset to master`);

    merge-on-comment:
        name: Merge on keyword comment
        if: |
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request.url != '' &&
            github.event.comment.user.login == github.repository_owner &&
            (
              contains(github.event.comment.body, 'LGTM') ||
              contains(github.event.comment.body, 'looks good') ||
              contains(github.event.comment.body, '/merge') ||
              contains(github.event.comment.body, 'ship it')
            )
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - name: Squash merge and reset testing
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: pr } = await github.rest.pulls.get({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.payload.issue.number,
                      });
                      if (pr.base.ref !== 'master') {
                        core.info('PR does not target master, skipping');
                        return;
                      }

                      const { data: { check_runs } } = await github.rest.checks.listForRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: pr.head.sha,
                      });
                      const relevant = check_runs.filter(r => !r.name.startsWith('Merge on'));
                      const pending = relevant.filter(r => r.status !== 'completed');
                      const failed = relevant.filter(r =>
                        r.status === 'completed' &&
                        !['success', 'skipped', 'neutral'].includes(r.conclusion)
                      );
                      if (pending.length > 0) {
                        core.setFailed('CI still running: ' + pending.map(r => r.name).join(', '));
                        return;
                      }
                      if (failed.length > 0) {
                        core.setFailed('CI failed: ' + failed.map(r => r.name).join(', '));
                        return;
                      }

                      await github.rest.pulls.merge({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr.number,
                        merge_method: 'squash',
                      });

                      const { data: masterRef } = await github.rest.git.getRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: 'heads/master',
                      });
                      await github.rest.git.updateRef({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: 'heads/testing',
                        sha: masterRef.object.sha,
                        force: true,
                      });
                      core.info(`PR #${pr.number} squash-merged to master; testing reset to master`);
