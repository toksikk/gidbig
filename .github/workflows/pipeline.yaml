name: Check and build

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    preparation:
        name: Prepare environment
        runs-on: ubuntu-latest

        outputs:
            go_version: ${{ steps.determine_go_version.outputs.go_version }}

        steps:
            - uses: actions/checkout@v6

            - name: Determine Go version from go.mod
              id: determine_go_version
              run: echo "go_version=$(grep "go 1." go.mod | cut -d " " -f 2)" >> $GITHUB_OUTPUT

    check_code:
        name: Check code
        needs: preparation
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ needs.preparation.outputs.go_version }}

            - name: Lint
              uses: golangci/golangci-lint-action@v9

    build:
        name: Build
        needs:
            - check_code
            - preparation
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ needs.preparation.outputs.go_version }}

            - name: Run build
              run: make build

    deploy:
        name: Deploy
        if: >-
            ${{
                github.event_name == 'workflow_dispatch' ||
                (
                    github.event_name == 'push' &&
                    github.ref == 'refs/heads/master' &&
                    github.actor != 'renovate[bot]' &&
                    github.actor != 'dependabot[bot]' &&
                    !startsWith(github.ref_name, 'renovate/') &&
                    !startsWith(github.ref_name, 'dependabot/')
                ) ||
                (
                    github.event_name == 'pull_request' &&
                    github.actor != 'renovate[bot]' &&
                    github.actor != 'dependabot[bot]'
                )
            }}
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Resolve deploy SHA
              id: sha
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
                  else
                    echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
                  fi

            - name: Dispatch Deploy Repo
              uses: peter-evans/repository-dispatch@v4.0.1
              with:
                  token: ${{ secrets.DEPLOY_REPO_ACCESS_TOKEN }}
                  repository: toksikk/deploy-gidbig
                  event-type: deploy
                  client-payload: '{"sha": "${{ steps.sha.outputs.sha }}"}'
