name: Check and build

on:
    push:
    workflow_dispatch:

jobs:
    detect_changes:
        name: Detect file changes
        runs-on: ubuntu-latest

        outputs:
            go: ${{ steps.filter.outputs.go }}

        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      go:
                        - '**/*.go'
                        - 'go.mod'
                        - 'go.sum'
                        - 'Makefile'

    check_code:
        name: Check code
        needs: detect_changes
        if: needs.detect_changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum

            - name: Lint
              uses: golangci/golangci-lint-action@v9

            - name: Test
              run: go test ./...

    build:
        name: Build
        needs: detect_changes
        if: needs.detect_changes.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum

            - name: Build
              run: make build

    deploy:
        name: Deploy
        if: >-
            ${{
                github.event_name == 'workflow_dispatch' ||
                (
                    github.actor != 'renovate[bot]' &&
                    github.actor != 'dependabot[bot]' &&
                    !startsWith(github.ref_name, 'renovate/') &&
                    !startsWith(github.ref_name, 'dependabot/')
                )
            }}
        needs: [check_code, build]
        runs-on: ubuntu-latest

        steps:
            - name: Check deploy eligibility
              id: check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if [ "${{ github.ref_name }}" = "master" ]; then
                      echo "deploy=true" >> $GITHUB_OUTPUT
                  else
                      PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --head "${{ github.ref_name }}" --state open --json number -q 'length')
                      echo "deploy=$([ "${PR_COUNT:-0}" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
                  fi

            - name: Dispatch Deploy Repo
              if: steps.check.outputs.deploy == 'true'
              uses: peter-evans/repository-dispatch@v4.0.1
              with:
                  token: ${{ secrets.DEPLOY_REPO_ACCESS_TOKEN }}
                  repository: toksikk/deploy-gidbig
                  event-type: deploy
                  client-payload: '{"sha": "${{ github.sha }}"}'
