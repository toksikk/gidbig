name: Check and build

on:
    push:
    workflow_dispatch:

jobs:
    preparation:
        name: Prepare environment
        runs-on: ubuntu-latest

        outputs:
            go_version: ${{ steps.determine_go_version.outputs.go_version }}

        steps:
            - uses: actions/checkout@v6

            - name: Determine Go version from go.mod
              id: determine_go_version
              run: echo "go_version=$(grep "go 1." go.mod | cut -d " " -f 2)" >> $GITHUB_OUTPUT

    check_code:
        name: Check code
        needs: preparation
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ needs.preparation.outputs.go_version }}

            - name: Lint
              uses: golangci/golangci-lint-action@v9

    build:
        name: Build
        needs:
            - check_code
            - preparation
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ needs.preparation.outputs.go_version }}

            - name: Run build
              run: make build

    deploy:
        name: Deploy
        if: >-
            ${{
                github.event_name == 'workflow_dispatch' ||
                (
                    github.actor != 'renovate[bot]' &&
                    github.actor != 'dependabot[bot]' &&
                    !startsWith(github.ref_name, 'renovate/') &&
                    !startsWith(github.ref_name, 'dependabot/')
                )
            }}
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Check deploy eligibility
              id: check
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if [ "${{ github.ref_name }}" = "master" ]; then
                      echo "deploy=true" >> $GITHUB_OUTPUT
                  else
                      PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --head "${{ github.ref_name }}" --state open --json number -q 'length')
                      echo "deploy=$([ "${PR_COUNT:-0}" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
                  fi

            - name: Dispatch Deploy Repo
              if: steps.check.outputs.deploy == 'true'
              uses: peter-evans/repository-dispatch@v4.0.1
              with:
                  token: ${{ secrets.DEPLOY_REPO_ACCESS_TOKEN }}
                  repository: toksikk/deploy-gidbig
                  event-type: deploy
                  client-payload: '{"sha": "${{ github.sha }}"}'
