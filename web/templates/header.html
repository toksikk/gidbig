{{ define "header" }}
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmRABUTG5bVLxhkBqSFNnhCW27ou" crossorigin="anonymous"></script>
    <style>
        body { padding-top: 70px; }
        .sounditem { margin: 3px; padding: 10px; background-color: #f8f9fa; border-radius: 6px; }
        .sound-hidden { display: none !important; }
        #queue-panel { position: fixed; bottom: 1rem; right: 1rem; z-index: 1050; min-width: 260px; }
    </style>
    <link href="static/css/main.css" rel="stylesheet">
    <link rel="apple-touch-icon" href="static/icon.png">
    <link rel="icon" type="image/png" href="static/icon.png">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gidbig</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Gidbig</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar" aria-expanded="false" aria-controls="navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div id="navbar" class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    {{ range .Prefixes }}
                    <li class="nav-item"><a class="nav-link" href="#{{ . }}">{{ . }}</a></li>
                    {{ end }}
                </ul>
                {{ if .Username }}
                <div class="d-flex align-items-center gap-2">
                    {{ if .AvatarURL }}<img src="{{ .AvatarURL }}" class="rounded-circle" width="28" height="28" alt="">{{ end }}
                    <span class="text-light">{{ .Username }}</span>
                    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
                </div>
                {{ end }}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="container-fluid">
            <h1>Gidbig</h1>
            <p class="lead">{{ template "sessionHandler" . }}</p>
            {{ end }}
